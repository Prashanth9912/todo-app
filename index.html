<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#6C63FF"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Todo App"/>
<title>Todo List App</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --accent: #6C63FF;
  --accent2: #4ECDC4;
  --accent3: #FF6B6B;
  --bg: #0F0E17;
  --bg2: #1A1828;
  --bg3: #232136;
  --card: #1E1C2E;
  --border: rgba(108,99,255,0.2);
  --text: #FFFFFE;
  --text2: #A7A9BE;
  --text3: #6B6D7E;
  --high: #FF6B6B;
  --med: #FFD93D;
  --low: #4ECDC4;
  --success: #6BCB77;
  --radius: 16px;
  --radius-sm: 10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* App Shell */
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}

/* Header */
.header{padding:20px 20px 12px;background:var(--bg);position:relative;z-index:10;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.app-title{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-btns{display:flex;gap:8px;}
.icon-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
.icon-btn:active{transform:scale(.92);background:var(--bg3);}

/* Tab bar */
.tabs{display:flex;gap:6px;padding:0 20px 14px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:7px 16px;border-radius:50px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.tab .badge{background:rgba(255,255,255,0.25);border-radius:50px;padding:1px 7px;font-size:11px;font-weight:600;}
.tab:not(.active) .badge{background:var(--bg3);color:var(--text2);}
.tab-add{border-style:dashed;color:var(--accent);}
.tab-add:active{background:rgba(108,99,255,.1);}

/* Content */
.content{flex:1;overflow-y:auto;padding:0 16px 100px;}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;opacity:.7;}
.empty-icon{font-size:52px;}
.empty-text{font-size:15px;color:var(--text2);text-align:center;line-height:1.6;}

/* Add task bar */
.add-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:12px 16px 20px;background:linear-gradient(to top,var(--bg) 80%,transparent);z-index:20;}
.add-row{display:flex;gap:8px;}
.add-input{flex:1;padding:13px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;outline:none;transition:border-color .2s;}
.add-input:focus{border-color:var(--accent);}
.add-input::placeholder{color:var(--text3);}
.add-btn{padding:13px 18px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;}
.add-btn:active{transform:scale(.96);background:#5a52e0;}
.details-btn{padding:13px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:15px;cursor:pointer;transition:all .2s;}
.details-btn:active{background:var(--bg3);}

/* Section label */
.section-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:16px 4px 8px;}

/* Task card */
.task-card{background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:8px;overflow:hidden;transition:all .2s;animation:slideIn .2s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.task-card.done{opacity:.6;}
.task-inner{display:flex;align-items:flex-start;padding:14px 12px;gap:10px;}
.priority-dot{width:4px;align-self:stretch;border-radius:4px;flex-shrink:0;margin-right:2px;}
.priority-dot.high{background:var(--high);}
.priority-dot.medium{background:var(--med);}
.priority-dot.low{background:var(--low);}

/* Checkbox */
.check-wrap{position:relative;flex-shrink:0;margin-top:1px;}
.check-wrap input{position:absolute;opacity:0;width:22px;height:22px;cursor:pointer;z-index:1;}
.check-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.check-wrap input:checked + .check-box{background:var(--accent);border-color:var(--accent);}
.check-wrap input:checked + .check-box::after{content:'✓';color:#fff;font-size:13px;font-weight:700;}

/* Task body */
.task-body{flex:1;min-width:0;}
.task-text{font-size:15px;font-weight:500;color:var(--text);line-height:1.4;word-break:break-word;}
.task-card.done .task-text{text-decoration:line-through;color:var(--text3);}
.task-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.meta-pill{display:flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:50px;font-weight:500;}
.meta-pill.due{background:rgba(255,217,61,.1);color:var(--med);}
.meta-pill.due.overdue{background:rgba(255,107,107,.15);color:var(--high);}
.meta-pill.loc{background:rgba(78,205,196,.1);color:var(--accent2);}
.meta-pill.loc.notified{background:rgba(107,203,119,.1);color:var(--success);}

/* Task actions */
.task-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.task-btn{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--text3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.task-btn:active{transform:scale(.88);}
.task-btn.edit:active{color:var(--accent);background:rgba(108,99,255,.15);}
.task-btn.del:active{color:var(--high);background:rgba(255,107,107,.15);}

/* Divider */
.divider{height:1px;background:var(--border);margin:12px 0 4px;}

/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;padding:20px 20px 40px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-handle{width:40px;height:4px;border-radius:4px;background:var(--border);margin:0 auto 18px;}
.modal-title{font-size:18px;font-weight:700;margin-bottom:18px;color:var(--text);}
.field-label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.field{margin-bottom:16px;}
.field input,.field select,.field textarea{width:100%;padding:13px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field select{cursor:pointer;}
.field select option{background:var(--bg3);}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.priority-btns{display:flex;gap:8px;}
.p-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;}
.p-btn.high.active{background:rgba(255,107,107,.2);border-color:var(--high);color:var(--high);}
.p-btn.medium.active{background:rgba(255,217,61,.2);border-color:var(--med);color:var(--med);}
.p-btn.low.active{background:rgba(78,205,196,.2);border-color:var(--low);color:var(--low);}
.loc-display{padding:10px 14px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border);font-size:13px;color:var(--text2);margin-bottom:8px;min-height:42px;display:flex;align-items:center;word-break:break-all;}
.loc-btns{display:flex;gap:8px;}
.loc-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;text-align:center;}
.loc-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.loc-btn:active{transform:scale(.96);}
.radius-row{display:flex;align-items:center;gap:12px;margin-top:10px;}
.radius-row input[type=range]{flex:1;accent-color:var(--accent);}
.radius-val{font-size:13px;color:var(--accent);font-weight:600;min-width:40px;text-align:right;}
.modal-btns{display:flex;gap:10px;margin-top:20px;}
.modal-btn{flex:1;padding:14px;border-radius:var(--radius-sm);border:none;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;}
.modal-btn.cancel{background:var(--bg3);color:var(--text2);}
.modal-btn.save{background:var(--accent);color:#fff;}
.modal-btn:active{transform:scale(.97);}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;font-size:14px;color:var(--text);z-index:200;opacity:0;transition:all .3s;pointer-events:none;max-width:340px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{border-color:var(--success);color:var(--success);}
.toast.error{border-color:var(--high);color:var(--high);}
.toast.info{border-color:var(--accent);color:var(--accent);}

/* New list modal */
.new-list-input{width:100%;padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Outfit',sans-serif;font-size:16px;outline:none;margin-bottom:16px;}
.new-list-input:focus{border-color:var(--accent);}

/* Confirm modal */
.confirm-msg{font-size:15px;color:var(--text2);margin-bottom:20px;line-height:1.6;}

/* GPS status */
.gps-status{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);padding:4px 10px;border-radius:50px;background:var(--bg2);border:1px solid var(--border);}
.gps-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);}
.gps-dot.active{background:var(--success);box-shadow:0 0 6px var(--success);}

/* Scrollable tabs fix */
.tab-wrapper{display:flex;align-items:center;gap:6px;padding:0 20px 14px;overflow-x:auto;scrollbar-width:none;}
.tab-wrapper::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="app-title">📋 My Lists</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="gps-status" id="gpsStatus">
          <div class="gps-dot" id="gpsDot"></div>
          <span id="gpsText">GPS off</span>
        </div>
        <button class="icon-btn" onclick="openNewListModal()" title="New List">＋</button>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tab-wrapper" id="tabWrapper"></div>

  <!-- Content -->
  <div class="content" id="content"></div>

  <!-- Add bar -->
  <div class="add-bar" id="addBar" style="display:none;">
    <div class="add-row">
      <input class="add-input" id="addInput" placeholder="Add a task..." onkeydown="if(event.key==='Enter')quickAdd()"/>
      <button class="details-btn" onclick="openTaskModal()" title="Full details">⚙️</button>
      <button class="add-btn" onclick="quickAdd()">Add</button>
    </div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="taskModal" onclick="if(event.target===this)closeTaskModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="taskModalTitle">New Task</div>
    <div class="field">
      <div class="field-label">Task</div>
      <input id="tm_text" placeholder="What needs to be done?"/>
    </div>
    <div class="field">
      <div class="field-label">Priority</div>
      <div class="priority-btns">
        <button class="p-btn high" onclick="setPriority('High')">🔴 High</button>
        <button class="p-btn medium active" onclick="setPriority('Medium')">🟡 Medium</button>
        <button class="p-btn low" onclick="setPriority('Low')">🟢 Low</button>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <div class="field-label">Due Date</div>
        <input type="date" id="tm_date"/>
      </div>
      <div class="field">
        <div class="field-label">Due Time</div>
        <input type="time" id="tm_time"/>
      </div>
    </div>
    <div class="field">
      <div class="field-label">📍 Location Reminder</div>
      <div class="loc-display" id="tm_locDisplay">No location set</div>
      <div class="loc-btns">
        <button class="loc-btn primary" onclick="getMyLocation()">📍 Use My Location</button>
        <button class="loc-btn" onclick="clearLocation()">✕ Clear</button>
      </div>
      <div class="radius-row">
        <span style="font-size:12px;color:var(--text3);">Alert within</span>
        <input type="range" id="tm_radius" min="0.1" max="5" step="0.1" value="0.5" oninput="document.getElementById('tm_radiusVal').textContent=parseFloat(this.value).toFixed(1)+'km'"/>
        <span class="radius-val" id="tm_radiusVal">0.5km</span>
      </div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeTaskModal()">Cancel</button>
      <button class="modal-btn save" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- New List Modal -->
<div class="modal-overlay" id="newListModal" onclick="if(event.target===this)closeNewListModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">New List</div>
    <input class="new-list-input" id="newListInput" placeholder="List name..." onkeydown="if(event.key==='Enter')createList()"/>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeNewListModal()">Cancel</button>
      <button class="modal-btn save" onclick="createList()">Create</button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="confirmTitle">Confirm</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeConfirm()">Cancel</button>
      <button class="modal-btn save" style="background:var(--high);" onclick="doConfirm()">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let data = JSON.parse(localStorage.getItem('todo_data') || '{}');
let activeList = null;
let editIdx = null;
let taskPriority = 'Medium';
let taskLat = null, taskLon = null, taskAddr = '';
let confirmCallback = null;
let gpsLat = null, gpsLon = null;
let gpsWatchId = null;
let notifiedDue = new Set(JSON.parse(localStorage.getItem('notified_due') || '[]'));
let notifiedLoc = new Set(JSON.parse(localStorage.getItem('notified_loc') || '[]'));

// ── Persist ───────────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem('todo_data', JSON.stringify(data));
  localStorage.setItem('notified_due', JSON.stringify([...notifiedDue]));
  localStorage.setItem('notified_loc', JSON.stringify([...notifiedLoc]));
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 3000);
}

// ── Notifications ─────────────────────────────────────────────────────────────
function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function sendNotification(title, body, icon='📋') {
  // Vibrate
  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  // In-app toast always
  showToast(`${icon} ${title}: ${body}`, 'info');
  // System notification
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body, icon: 'https://cdn.jsdelivr.net/npm/twemoji@latest/2/72x72/1f4cb.png' });
  }
}

// ── GPS ───────────────────────────────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) return;
  gpsWatchId = navigator.geolocation.watchPosition(
    pos => {
      gpsLat = pos.coords.latitude;
      gpsLon = pos.coords.longitude;
      document.getElementById('gpsDot').className = 'gps-dot active';
      document.getElementById('gpsText').textContent = 'GPS on';
      checkLocationReminders();
    },
    err => {
      document.getElementById('gpsDot').className = 'gps-dot';
      document.getElementById('gpsText').textContent = 'GPS off';
    },
    { enableHighAccuracy: true, maximumAge: 30000, timeout: 10000 }
  );
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function checkLocationReminders() {
  if (gpsLat === null) return;
  Object.entries(data).forEach(([listName, tasks]) => {
    tasks.forEach((task, i) => {
      if (task.done || task.loc_lat == null) return;
      const key = `${listName}_${i}_${task.text}`;
      if (notifiedLoc.has(key)) return;
      const dist = haversine(gpsLat, gpsLon, task.loc_lat, task.loc_lon);
      if (dist <= (task.radius || 0.5)) {
        notifiedLoc.add(key);
        save();
        sendNotification('📍 Location Reminder', `"${task.text}" — you're nearby!`, '📍');
      }
    });
  });
}

function checkDueReminders() {
  const now = new Date();
  Object.entries(data).forEach(([listName, tasks]) => {
    tasks.forEach((task, i) => {
      if (task.done || !task.due_date) return;
      const key = `${listName}_${i}_${task.due_date}`;
      if (notifiedDue.has(key)) return;
      const dueStr = task.due_date + 'T' + (task.due_time || '23:59');
      const due = new Date(dueStr);
      const diff = (due - now) / 1000;
      if (diff <= 1800) {
        notifiedDue.add(key);
        save();
        if (diff < 0) {
          sendNotification('⚠️ Overdue!', `"${task.text}" in [${listName}]`, '⚠️');
        } else {
          sendNotification('⏰ Due Soon', `"${task.text}" due in ${Math.round(diff/60)} min`, '⏰');
        }
      }
    });
  });
}

// ── Sidebar / Tabs ────────────────────────────────────────────────────────────
function renderTabs() {
  const wrap = document.getElementById('tabWrapper');
  wrap.innerHTML = '';
  const lists = Object.keys(data);
  if (lists.length === 0) {
    wrap.innerHTML = '<span style="font-size:13px;color:var(--text3);padding:4px 0;">No lists yet — tap ＋ to create one</span>';
    return;
  }
  lists.forEach(name => {
    const pending = data[name].filter(t => !t.done).length;
    const btn = document.createElement('button');
    btn.className = 'tab' + (name === activeList ? ' active' : '');
    btn.innerHTML = `${name} <span class="badge">${pending}</span>`;
    btn.onclick = () => selectList(name);
    wrap.appendChild(btn);
  });
}

function selectList(name) {
  activeList = name;
  document.getElementById('addBar').style.display = 'block';
  renderTabs();
  renderContent();
}

// ── Content ───────────────────────────────────────────────────────────────────
function renderContent() {
  const el = document.getElementById('content');
  if (!activeList || !data[activeList]) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">👆</div><div class="empty-text">Select a list from above<br>or create a new one</div></div>';
    return;
  }
  const tasks = data[activeList];
  const pending = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done);
  let html = '';

  if (pending.length === 0 && done.length === 0) {
    html = '<div class="empty"><div class="empty-icon">✨</div><div class="empty-text">No tasks yet!<br>Add one below.</div></div>';
  } else {
    if (pending.length > 0) {
      html += `<div class="section-label">Tasks · ${pending.length}</div>`;
      pending.forEach(t => { html += taskCard(t, tasks.indexOf(t)); });
    }
    if (done.length > 0) {
      html += '<div class="divider"></div>';
      html += `<div class="section-label">Completed · ${done.length}</div>`;
      done.forEach(t => { html += taskCard(t, tasks.indexOf(t)); });
    }
  }
  el.innerHTML = html;
}

function taskCard(task, idx) {
  const isOverdue = task.due_date && !task.done && new Date(task.due_date + 'T' + (task.due_time || '23:59')) < new Date();
  const priority = (task.priority || 'medium').toLowerCase();
  let meta = '';
  if (task.due_date) {
    meta += `<span class="meta-pill due ${isOverdue ? 'overdue' : ''}">🗓 ${task.due_date}${task.due_time ? ' ' + task.due_time : ''}</span>`;
  }
  if (task.loc_addr) {
    const short = task.loc_addr.length > 30 ? task.loc_addr.substring(0, 30) + '…' : task.loc_addr;
    meta += `<span class="meta-pill loc">📍 ${short}</span>`;
  }
  return `
  <div class="task-card ${task.done ? 'done' : ''}" id="task_${idx}">
    <div class="task-inner">
      <div class="priority-dot ${priority}"></div>
      <label class="check-wrap">
        <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${idx})"/>
        <div class="check-box"></div>
      </label>
      <div class="task-body">
        <div class="task-text">${escHtml(task.text)}</div>
        ${meta ? `<div class="task-meta">${meta}</div>` : ''}
      </div>
      <div class="task-actions">
        <button class="task-btn edit" onclick="openEditModal(${idx})">✏️</button>
        <button class="task-btn del" onclick="confirmDeleteTask(${idx})">🗑</button>
      </div>
    </div>
  </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Actions ───────────────────────────────────────────────────────────────────
function quickAdd() {
  const inp = document.getElementById('addInput');
  const text = inp.value.trim();
  if (!text) { showToast('Please type a task!', 'error'); return; }
  data[activeList].push({
    text, done: false, priority: 'Medium',
    due_date: '', due_time: '',
    loc_lat: null, loc_lon: null, loc_addr: '', radius: 0.5
  });
  save();
  inp.value = '';
  renderTabs();
  renderContent();
  showToast('Task added! ✅', 'success');
}

function toggleTask(idx) {
  data[activeList][idx].done = !data[activeList][idx].done;
  save();
  renderTabs();
  renderContent();
}

function confirmDeleteTask(idx) {
  openConfirm('Delete Task', `Delete "${data[activeList][idx].text}"?`, () => {
    data[activeList].splice(idx, 1);
    save();
    renderTabs();
    renderContent();
    showToast('Task deleted', 'info');
  });
}

// ── List management ───────────────────────────────────────────────────────────
function openNewListModal() {
  document.getElementById('newListModal').classList.add('open');
  setTimeout(() => document.getElementById('newListInput').focus(), 300);
}
function closeNewListModal() {
  document.getElementById('newListModal').classList.remove('open');
  document.getElementById('newListInput').value = '';
}
function createList() {
  const name = document.getElementById('newListInput').value.trim();
  if (!name) { showToast('Enter a list name!', 'error'); return; }
  if (data[name]) { showToast('List already exists!', 'error'); return; }
  data[name] = [];
  save();
  closeNewListModal();
  selectList(name);
  showToast(`"${name}" created! 🎉`, 'success');
}

// ── Task Modal ────────────────────────────────────────────────────────────────
function openTaskModal(idx = null) {
  editIdx = idx;
  const modal = document.getElementById('taskModal');
  document.getElementById('taskModalTitle').textContent = idx !== null ? 'Edit Task' : 'New Task';

  if (idx !== null) {
    const t = data[activeList][idx];
    document.getElementById('tm_text').value = t.text;
    document.getElementById('tm_date').value = t.due_date || '';
    document.getElementById('tm_time').value = t.due_time || '';
    document.getElementById('tm_radius').value = t.radius || 0.5;
    document.getElementById('tm_radiusVal').textContent = (t.radius || 0.5).toFixed(1) + 'km';
    taskLat = t.loc_lat; taskLon = t.loc_lon; taskAddr = t.loc_addr || '';
    setPriority(t.priority || 'Medium');
    updateLocDisplay();
  } else {
    document.getElementById('tm_text').value = '';
    document.getElementById('tm_date').value = '';
    document.getElementById('tm_time').value = '';
    document.getElementById('tm_radius').value = 0.5;
    document.getElementById('tm_radiusVal').textContent = '0.5km';
    taskLat = null; taskLon = null; taskAddr = '';
    setPriority('Medium');
    updateLocDisplay();
  }
  modal.classList.add('open');
  setTimeout(() => document.getElementById('tm_text').focus(), 300);
}

function openEditModal(idx) { openTaskModal(idx); }
function closeTaskModal() { document.getElementById('taskModal').classList.remove('open'); }

function setPriority(p) {
  taskPriority = p;
  document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.p-btn.${p.toLowerCase()}`).classList.add('active');
}

function getMyLocation() {
  showToast('Getting your location...', 'info');
  if (!navigator.geolocation) { showToast('GPS not supported', 'error'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      taskLat = pos.coords.latitude;
      taskLon = pos.coords.longitude;
      taskAddr = `${taskLat.toFixed(5)}, ${taskLon.toFixed(5)}`;
      // Try reverse geocode
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${taskLat}&lon=${taskLon}&format=json`)
        .then(r => r.json())
        .then(d => { taskAddr = d.display_name || taskAddr; updateLocDisplay(); })
        .catch(() => updateLocDisplay());
      updateLocDisplay();
      showToast('Location captured! 📍', 'success');
    },
    err => showToast('Could not get location. Enable GPS!', 'error'),
    { enableHighAccuracy: true, timeout: 8000 }
  );
}

function clearLocation() {
  taskLat = null; taskLon = null; taskAddr = '';
  updateLocDisplay();
}

function updateLocDisplay() {
  const el = document.getElementById('tm_locDisplay');
  if (taskAddr) {
    const short = taskAddr.length > 60 ? taskAddr.substring(0, 60) + '…' : taskAddr;
    el.textContent = '📍 ' + short;
    el.style.color = 'var(--accent2)';
  } else {
    el.textContent = 'No location set';
    el.style.color = 'var(--text3)';
  }
}

function saveTask() {
  const text = document.getElementById('tm_text').value.trim();
  if (!text) { showToast('Please enter a task!', 'error'); return; }
  const task = {
    text,
    done: editIdx !== null ? data[activeList][editIdx].done : false,
    priority: taskPriority,
    due_date: document.getElementById('tm_date').value,
    due_time: document.getElementById('tm_time').value,
    loc_lat: taskLat,
    loc_lon: taskLon,
    loc_addr: taskAddr,
    radius: parseFloat(document.getElementById('tm_radius').value)
  };
  if (editIdx !== null) {
    data[activeList][editIdx] = task;
    showToast('Task updated! ✅', 'success');
  } else {
    data[activeList].push(task);
    showToast('Task added! ✅', 'success');
  }
  save();
  closeTaskModal();
  renderTabs();
  renderContent();
}

// ── Confirm modal ─────────────────────────────────────────────────────────────
function openConfirm(title, msg, cb) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  confirmCallback = cb;
  document.getElementById('confirmModal').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirmModal').classList.remove('open');
  confirmCallback = null;
}
function doConfirm() {
  if (confirmCallback) confirmCallback();
  closeConfirm();
}

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  // Select first list if exists
  const lists = Object.keys(data);
  if (lists.length > 0) {
    activeList = lists[0];
    document.getElementById('addBar').style.display = 'block';
  }
  renderTabs();
  renderContent();
  requestNotifPermission();
  startGPS();
  // Check due dates every 60 seconds
  setInterval(checkDueReminders, 60000);
  checkDueReminders();
}

init();
</script>
</body>
</html>
